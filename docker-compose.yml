version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stadium_os_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./stadium_os.db
      - SECRET_KEY=supersecretkeyforstadiumosai2026worldcup
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - GEMINI_API_KEY=mock-key-for-stadium-os
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stadium_os_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
